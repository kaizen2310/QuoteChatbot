<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quotes Chatbot</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: linear-gradient(135deg, #1a2b4a 0%, #0d9488 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        #chat-container {
            width: 100%;
            max-width: 600px;
            background: white;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            height: 600px;
        }
        #chat-header {
            background: #1a2b4a;
            color: white;
            padding: 18px 20px;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .bot-avatar {
            width: 40px; height: 40px;
            background: #0d9488;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 20px;
        }
        .header-text h2 { font-size: 1rem; margin: 0; }
        .header-text p { font-size: 0.8rem; color: #94a3b8; margin: 2px 0 0 0; }
        #chat-box {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            background: #f8f6f1;
        }
        .message {
            max-width: 78%;
            padding: 12px 16px;
            border-radius: 18px;
            font-size: 0.92rem;
            line-height: 1.5;
            word-wrap: break-word;
        }
        .user-msg {
            background: #1a2b4a;
            color: white;
            align-self: flex-end;
            border-bottom-right-radius: 4px;
        }
        .bot-msg {
            background: white;
            color: #1e293b;
            align-self: flex-start;
            border-bottom-left-radius: 4px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }
        .typing {
            background: white;
            align-self: flex-start;
            padding: 12px 18px;
            border-radius: 18px;
            border-bottom-left-radius: 4px;
            color: #94a3b8;
            font-style: italic;
            font-size: 0.85rem;
        }
        #input-area {
            display: flex;
            padding: 14px;
            border-top: 1px solid #e2e8f0;
            background: white;
            gap: 10px;
        }
        #user-input {
            flex: 1;
            padding: 12px 16px;
            border: 1.5px solid #e2e8f0;
            border-radius: 24px;
            outline: none;
            font-size: 0.92rem;
            transition: border-color 0.2s;
        }
        #user-input:focus { border-color: #0d9488; }
        #send-btn {
            padding: 12px 22px;
            background: #0d9488;
            color: white;
            border: none;
            border-radius: 24px;
            cursor: pointer;
            font-size: 0.92rem;
            font-weight: 600;
            transition: background 0.2s;
        }
        #send-btn:hover { background: #0a7567; }
    </style>
</head>
<body>
    <div id="chat-container">
        <div id="chat-header">
            <div class="bot-avatar">💬</div>
            <div class="header-text">
                <h2>Quotes Bot</h2>
                <p>Powered by Rasa NLU • Always Online</p>
            </div>
        </div>
        <div id="chat-box">
            <div class="message bot-msg">👋 Hello! I'm your Quotes Bot. Ask me for motivation, inspiration, love, success, or humor quotes!</div>
        </div>
        <div id="input-area">
            <input type="text" id="user-input" placeholder="Type a message..." autocomplete="off"/>
            <button id="send-btn" onclick="sendMessage()">Send</button>
        </div>
    </div>

    <script>
        const RASA_URL = "http://localhost:5005/webhooks/rest/webhook";
        const chatBox = document.getElementById("chat-box");
        const userInput = document.getElementById("user-input");

        console.log("✅ Frontend loaded. Rasa endpoint:", RASA_URL);

        function appendMessage(text, sender) {
            const div = document.createElement("div");
            div.classList.add("message", sender === "user" ? "user-msg" : "bot-msg");
            div.textContent = text;
            chatBox.appendChild(div);
            chatBox.scrollTop = chatBox.scrollHeight;
            console.log(`[${sender}]:`, text);
        }

        function showTyping() {
            const div = document.createElement("div");
            div.classList.add("typing");
            div.id = "typing-indicator";
            div.textContent = "Bot is typing...";
            chatBox.appendChild(div);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        function removeTyping() {
            const t = document.getElementById("typing-indicator");
            if (t) t.remove();
        }

        async function sendMessage() {
            const msg = userInput.value.trim();
            if (!msg) return;

            appendMessage(msg, "user");
            userInput.value = "";
            showTyping();

            try {
                console.log("📤 Sending:", msg);
                const response = await fetch(RASA_URL, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ sender: "web_user", message: msg })
                });

                console.log("📊 Response status:", response.status);

                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}: ${response.statusText}`);
                }

                const data = await response.json();
                console.log("📥 Received:", data);
                removeTyping();

                if (!data || data.length === 0) {
                    appendMessage("Sorry, I didn't understand that. Try asking for motivation, inspiration, love, success, or humor quotes!", "bot");
                } else {
                    data.forEach(item => {
                        if (item.text) appendMessage(item.text, "bot");
                    });
                }
            } catch (err) {
                removeTyping();
                console.error("❌ Error:", err);
                appendMessage("🚨 Connection Error: " + err.message + "\n\nMake sure both servers are running:\n\n1. Terminal 1: rasa run actions\n2. Terminal 2: rasa run --enable-api --cors \"*\"", "bot");
            }
        }

        userInput.addEventListener("keydown", e => {
            if (e.key === "Enter") sendMessage();
        });

        // Test connection on load
        window.addEventListener("load", async () => {
            console.log("🔍 Testing Rasa connection...");
            try {
                const testResponse = await fetch("http://localhost:5005/", { method: "HEAD" });
                console.log("✅ Rasa server is reachable!");
            } catch (err) {
                console.error("❌ Can't reach Rasa:", err);
                appendMessage("⚠️ Rasa server not found. Make sure Terminal 2 is running:\n\nrasa run --enable-api --cors \"*\"", "bot");
            }
        });
    </script>
</body>
</html>
